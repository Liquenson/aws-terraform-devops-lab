[eks_nodes]
node01 ansible_host=10.0.10.10 ansible_user=ec2-user
node02 ansible_host=10.0.11.10 ansible_user=ec2-user

[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
aws_region=eu-west-1
EOF

cat > ansible/playbooks/setup-linux.yml << 'EOF'
---
- name: Configuracion base servidores Linux
  hosts: all
  become: true
  tasks:
    - name: Instalar paquetes base
      yum:
        name: [curl, wget, git, vim, htop, jq, unzip]
        state: present
    - name: Hardening SSH - deshabilitar root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        backup: yes
      notify: Restart SSH
    - name: Configurar timezone
      timezone:
        name: Europe/Madrid
  handlers:
    - name: Restart SSH
      service: { name: sshd, state: restarted }
