apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      automountServiceAccountToken: false  # Fix: disable automounting (SonarCloud)
      containers:
        - name: webapp
          image: 538079272432.dkr.ecr.eu-west-1.amazonaws.com/webapp:1.0.0  # Fix: no "latest"
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"  # Fix: storage request (SonarCloud S6607)
            limits:
              cpu: "250m"
              memory: "256Mi"             # Fix: memory limit
              ephemeral-storage: "512Mi"  # Fix: storage limit
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-service
spec:
  type: LoadBalancer
  selector:
    app: webapp
  ports:
    - port: 80
      targetPort: 5000
