apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app: webapp
    spec:
      automountServiceAccountToken: false  # Fix: Bind to RBAC or disable automounting
      containers:
        - name: webapp
          image: 538079272432.dkr.ecr.eu-west-1.amazonaws.com/webapp:1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"  # Fix: storage request (SonarCloud S6607)
            limits:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"  # Fix: storage limit
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: AWS_REGION
              value: "eu-west-1"
