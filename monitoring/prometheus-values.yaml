prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 45GB             # Evita overflow del volumen

    walCompression: true            # Reduce uso de disco ~40%

    scrapeInterval: "30s"           # Granularidad adecuada para el entorno

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3     # gp3: más rápido y más barato que gp2
          resources:
            requests:
              storage: 50Gi

    externalLabels:
      cluster: dev-cluster          # Consistente con ci-cd.yml y deployment.yaml
      region: eu-west-1

    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "2Gi"

    securityContext:
      runAsNonRoot: true
      runAsUser: 65534              # nobody
      fsGroup: 65534

grafana:
  admin:
    existingSecret: grafana-admin-secret   # Referencia a K8s Secret
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true                   # Dashboards persisten entre reinicios
    storageClassName: gp3
    size: 10Gi

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  securityContext:
    runAsNonRoot: true
    runAsUser: 472                  # UID por defecto de Grafana

  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.devops-lab.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.devops-lab.com
