sonar.projectKey=Liquenson_aws-terraform-devops-lab
sonar.projectName=AWS Terraform DevOps Lab
sonar.projectVersion=1.0
sonar.organization=liquensonruben

# Fuentes principales
sonar.sources=docker/src,scripts,kubernetes,helm,argocd,monitoring
sonar.tests=docker/src/tests,scripts/tests

# Exclusiones de análisis
sonar.exclusions=**/.terraform/**,**/node_modules/**,**/.git/**,**/environments/**/*.tfvars,**/*.tfstate,**/*.tfstate.backup,**/.terraform.lock.hcl

# Exclusiones de cobertura (no contar tests en el % de coverage)
sonar.coverage.exclusions=**/tests/**,**/__pycache__/**

# Coverage y Python
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11
sonar.terraform.provider.aws.version=5
sonar.scm.provider=git
