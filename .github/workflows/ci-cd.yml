name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  TF_DIR: terraform/
  CLUSTER_NAME: dev-cluster

jobs:

  sonarcloud:
    name: Tests + SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install pytest pytest-cov boto3 botocore flask

      - name: Ejecutar tests con cobertura
        run: |
          pytest scripts/tests/ docker/src/tests/ \
            --cov=scripts \
            --cov=docker/src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: ${{ github.event_name == 'push' }}
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
        continue-on-error: true

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate
        continue-on-error: true

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var-file=../environments/dev/terraform.tfvars \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -out=tfplan
        continue-on-error: true

      - name: Guardar plan como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
        continue-on-error: true